<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dymart Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Dymart Store</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Cart</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Welcome to Dymart</h2>
    <p>Simple eCommerce website for DevOps Capstone Project</p>
  </section>

  <section class="products">
    <div class="card">
      <h3>Headphones</h3>
      <p>₹999</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Smart Watch</h3>
      <p>₹1999</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Mobile Cover</h3>
      <p>₹499</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>
  </section>

  <footer>
    <p>© 2026 Dymart Store</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
